name: Create Branch on Issue Assignment

on:
  issues:
    types: [assigned]

jobs:
  create-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine branch prefix from labels
        id: prefix
        run: |
          LABELS='${{ toJSON(github.event.issue.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"bug"'; then
            echo "value=fix" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"enhancement"'; then
            echo "value=feat" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"documentation"'; then
            echo "value=docs" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"refactor"'; then
            echo "value=refactor" >> "$GITHUB_OUTPUT"
          else
            echo "value=misc" >> "$GITHUB_OUTPUT"
          fi

      - name: Find Linear issue identifier
        id: linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          # Search for the Linear issue by the attached GitHub URL
          RESPONSE=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg url "$ISSUE_URL" \
              '{
                query: "query FindIssue($url: String!) { attachmentsForURL(url: $url) { nodes { issue { identifier } } } }",
                variables: { url: $url }
              }'
            )")

          IDENTIFIER=$(echo "$RESPONSE" | jq -r '.data.attachmentsForURL.nodes[0].issue.identifier // empty')

          if [ -z "$IDENTIFIER" ]; then
            echo "::warning::No Linear issue found for this GitHub issue"
            echo "identifier=" >> "$GITHUB_OUTPUT"
          else
            echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push branch
        id: branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSIGNEE="${{ github.event.assignee.login }}"
          PREFIX="${{ steps.prefix.outputs.value }}"
          LINEAR_ID="${{ steps.linear.outputs.identifier }}"
          TITLE="${{ github.event.issue.title }}"

          # Slugify the title
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)

          # Build branch name
          if [ -n "$LINEAR_ID" ]; then
            BRANCH="${ASSIGNEE}/${PREFIX}/${LINEAR_ID}-${SLUG}"
          else
            BRANCH="${ASSIGNEE}/${PREFIX}/${SLUG}"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

      - name: Comment branch name on issue
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.branch.outputs.branch }}'
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Branch \`${branch}\` created.\n\n\`\`\`bash\ngit fetch && git checkout ${branch}\n\`\`\``
            })
