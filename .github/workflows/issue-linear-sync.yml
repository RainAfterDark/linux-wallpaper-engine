name: Sync GitHub Issue to Linear

on:
  issues:
    types: [opened]

jobs:
  create-linear-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create Linear issue in project
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          RESPONSE=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg teamId "$LINEAR_TEAM_ID" \
              --arg projectId "$LINEAR_PROJECT_ID" \
              --arg title "$ISSUE_TITLE" \
              --arg description "$ISSUE_BODY" \
              '{
                query: "mutation CreateIssue($teamId: String!, $projectId: String!, $title: String!, $description: String!) { issueCreate(input: { teamId: $teamId, projectId: $projectId, title: $title, description: $description }) { success issue { id identifier url } } }",
                variables: { teamId: $teamId, projectId: $projectId, title: $title, description: $description }
              }'
            )")

          echo "Response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | jq -r '.data.issueCreate.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Failed to create Linear issue"
            exit 1
          fi

          ISSUE_ID=$(echo "$RESPONSE" | jq -r '.data.issueCreate.issue.id')
          ISSUE_IDENTIFIER=$(echo "$RESPONSE" | jq -r '.data.issueCreate.issue.identifier')
          echo "Created Linear issue: $ISSUE_IDENTIFIER"

          # Attach the GitHub issue URL to the Linear issue
          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg issueId "$ISSUE_ID" \
              --arg url "$ISSUE_URL" \
              --arg title "GitHub Issue" \
              '{
                query: "mutation AttachUrl($issueId: String!, $url: String!, $title: String!) { attachmentCreate(input: { issueId: $issueId, url: $url, title: $title }) { success } }",
                variables: { issueId: $issueId, url: $url, title: $title }
              }'
            )"
