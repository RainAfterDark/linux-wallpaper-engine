name: Sync GitHub Issue to Linear

on:
  issues:
    types: [opened]

jobs:
  create-linear-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Map GitHub labels to Linear label IDs
        id: labels
        run: |
          GITHUB_LABELS='${{ toJSON(github.event.issue.labels.*.name) }}'
          LABEL_IDS=""

          if echo "$GITHUB_LABELS" | grep -qi '"bug"'; then
            LABEL_IDS="3978d176-52ad-4e8c-8ac3-29666e4cbca6"
          elif echo "$GITHUB_LABELS" | grep -qi '"enhancement"'; then
            LABEL_IDS="654323d7-0042-4dd8-bb3b-c6cf4e6052da"
          fi

          echo "ids=$LABEL_IDS" >> "$GITHUB_OUTPUT"

      - name: Create Linear issue in project
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          LABEL_ID: ${{ steps.labels.outputs.ids }}
        run: |
          # Build the label array for the mutation
          if [ -n "$LABEL_ID" ]; then
            LABEL_ARG="--arg labelId \"$LABEL_ID\""
            LABEL_VAR=', $labelId: String!'
            LABEL_INPUT=', labelIds: [$labelId]'
            LABEL_VARS=', labelId: $labelId'
          else
            LABEL_ARG=""
            LABEL_VAR=""
            LABEL_INPUT=""
            LABEL_VARS=""
          fi

          if [ -n "$LABEL_ID" ]; then
            RESPONSE=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg teamId "$LINEAR_TEAM_ID" \
                --arg projectId "$LINEAR_PROJECT_ID" \
                --arg title "$ISSUE_TITLE" \
                --arg description "$ISSUE_BODY" \
                --arg stateId "2d7ef87e-c24b-4443-909e-603c399ce09a" \
                --arg labelId "$LABEL_ID" \
                '{
                  query: "mutation CreateIssue($teamId: String!, $projectId: String!, $title: String!, $description: String!, $stateId: String!, $labelId: String!) { issueCreate(input: { teamId: $teamId, projectId: $projectId, title: $title, description: $description, stateId: $stateId, labelIds: [$labelId] }) { success issue { id identifier url } } }",
                  variables: { teamId: $teamId, projectId: $projectId, title: $title, description: $description, stateId: $stateId, labelId: $labelId }
                }'
              )")
          else
            RESPONSE=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg teamId "$LINEAR_TEAM_ID" \
                --arg projectId "$LINEAR_PROJECT_ID" \
                --arg title "$ISSUE_TITLE" \
                --arg description "$ISSUE_BODY" \
                --arg stateId "2d7ef87e-c24b-4443-909e-603c399ce09a" \
                '{
                  query: "mutation CreateIssue($teamId: String!, $projectId: String!, $title: String!, $description: String!, $stateId: String!) { issueCreate(input: { teamId: $teamId, projectId: $projectId, title: $title, description: $description, stateId: $stateId }) { success issue { id identifier url } } }",
                  variables: { teamId: $teamId, projectId: $projectId, title: $title, description: $description, stateId: $stateId }
                }'
              )")
          fi

          echo "Response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | jq -r '.data.issueCreate.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Failed to create Linear issue"
            exit 1
          fi

          ISSUE_ID=$(echo "$RESPONSE" | jq -r '.data.issueCreate.issue.id')
          ISSUE_IDENTIFIER=$(echo "$RESPONSE" | jq -r '.data.issueCreate.issue.identifier')
          echo "Created Linear issue: $ISSUE_IDENTIFIER"

          # Attach the GitHub issue URL to the Linear issue
          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg issueId "$ISSUE_ID" \
              --arg url "$ISSUE_URL" \
              --arg title "GitHub Issue" \
              '{
                query: "mutation AttachUrl($issueId: String!, $url: String!, $title: String!) { attachmentCreate(input: { issueId: $issueId, url: $url, title: $title }) { success } }",
                variables: { issueId: $issueId, url: $url, title: $title }
              }'
            )"
